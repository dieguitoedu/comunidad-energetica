# Workflow oficial para compilar y desplegar automáticamente en GitHub Pages sin ramas secundarias
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Permisos necesarios para escribir en GitHub Pages y autenticar el despliegue
permissions:
  contents: read
  pages: write
  id-token: write

# Permite un solo despliegue activo simultáneo para evitar colisiones
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias 📦
        run: npm install

      - name: Compilar el proyecto estático 🏗️
        run: npm run build

      - name: Configurar Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Subir artefacto para Pages ⬆️
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar a GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
